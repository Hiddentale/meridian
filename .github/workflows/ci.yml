name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-lint:
    name: Commit Message Lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          VALID_TYPES="feat|fix|refactor|docs|chore|test|style|perf|ci|build|revert"
          PATTERN="^(${VALID_TYPES})(\(.+\))?\!?: .+"
          ERRORS=0

          for COMMIT in $(git log --no-merges origin/${{ github.base_ref }}..HEAD --format='%H'); do
            MSG=$(git log --format='%s' -n 1 "$COMMIT")
            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              echo "::error::Bad commit message: '$MSG'"
              echo "  Expected format: type(scope): description"
              echo "  Valid types: feat, fix, refactor, docs, chore, test, style, perf, ci, build, revert"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "::error::$ERRORS commit(s) do not follow Conventional Commits format."
            exit 1
          fi

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check backend/

      - name: Check lints
        run: ruff check backend/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest
